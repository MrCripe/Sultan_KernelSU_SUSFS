name: Sultan
permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      codename:
        required: true
        type: string
      repo:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string

jobs:
  build-kernel-sultan-kernelsu-susfs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ["WKSU-SUSFS"]
        page_size: ["4K", "16K"]

    steps:
      - name: Download and extract GCC 14.2.0 toolchain
        run: |
          echo "Downloading GCC 14.2.0 cross-compiler toolchain..."
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz
          gunzip x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz
          tar -xf x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar

      - name: Set CONFIG Environment Variable
        run: |
          CONFIG="android_kernel_google_tensynos"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV

      - name: Clone AnyKernel3 and Other Dependencies
        run: |
          ANYKERNEL_BRANCH="sultan-${{ inputs.codename }}"
          git clone https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          git clone https://github.com/TheWildJames/kernel_patches.git
          git clone https://github.com/kerneltoast/android_kernel_google_tensynos
          
          if [ "${{ matrix.variant }}" != "WKSU" ]; then
            SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          fi

      - name: Add KernelSU
        run: |
          cd "$CONFIG"
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/stable/kernel/setup.sh" | bash -s canary

      - name: Apply SUSFS Patches
        if: ${{ matrix.variant != 'WKSU' }}
        run: |
          cd "$CONFIG"
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true
          cp ../kernel_patches/sultan/sys.c_fix.patch ./
          patch -p1 < sys.c_fix.patch

      - name: Configure Kernel Settings (KSU, Mountify, Net, BBR, IPSet, Kyber)
        run: |
          cd "$CONFIG"
          CONF="./arch/arm64/configs/${{ inputs.codename }}_defconfig"
          
          echo "CONFIG_KSU=y" >> $CONF
          if [ "${{ matrix.variant }}" != "WKSU" ]; then echo "CONFIG_KSU_SUSFS=y" >> $CONF; else echo "CONFIG_KSU_SUSFS=n" >> $CONF; fi
          
          echo "CONFIG_TMPFS_XATTR=y" >> $CONF
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> $CONF
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> $CONF
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> $CONF
          echo "CONFIG_IP6_NF_MATCH_HL=y" >> $CONF
          
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> $CONF
          echo "CONFIG_TCP_CONG_BBR=y" >> $CONF
          echo "CONFIG_NET_SCH_FQ=y" >> $CONF
          echo "CONFIG_TCP_CONG_BIC=n" >> $CONF
          echo "CONFIG_TCP_CONG_WESTWOOD=n" >> $CONF
          echo "CONFIG_TCP_CONG_HTCP=n" >> $CONF
          
          echo "CONFIG_IP_SET=y" >> $CONF
          echo "CONFIG_IP_SET_MAX=65534" >> $CONF
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> $CONF
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> $CONF
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_IP=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_MAC=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_NET=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> $CONF
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> $CONF
          echo "CONFIG_IP_SET_LIST_SET=y" >> $CONF
          
          sed -i 's/# CONFIG_MQ_IOSCHED_KYBER is not set//g' $CONF
          echo "CONFIG_MQ_IOSCHED_KYBER=y" >> $CONF
          
          sed -i 's/CONFIG_LOCALVERSION="-Sultan"/CONFIG_LOCALVERSION="-Sultan-Wild"/' $CONF

      - name: Configure Page Size (4K / 16K)
        run: |
          cd "$CONFIG"
          CONF="./arch/arm64/configs/${{ inputs.codename }}_defconfig"
          
          if [ "${{ matrix.page_size }}" == "16K" ]; then
            sed -i 's/CONFIG_ARM64_4K_PAGES=y/# CONFIG_ARM64_4K_PAGES is not set/g' $CONF
            sed -i 's/CONFIG_ARM64_VA_BITS_39=y/# CONFIG_ARM64_VA_BITS_39 is not set/g' $CONF
            
            echo "CONFIG_ARM64_16K_PAGES=y" >> $CONF
            echo "CONFIG_ARM64_VA_BITS_47=y" >> $CONF
            echo "CONFIG_ARM64_VA_BITS=47" >> $CONF
            
            sed -i '/BUILD_BUG_ON(CONFIG_ARM64_VA_BITS > 40)/d' fs/proc/task_mmu.c
            echo "16KB Page Size enabled."
          else
            echo "Keeping default 4KB Page Size."
          fi

      - name: Build the Kernel and Modules
        run: |
          cd "$CONFIG"
          CC_PATH="$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-gcc"
          CROSS_PATH="$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-"
          
          # Жестко заставляем ядро собираться в папку out, чтобы ничего не потерялось
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_PATH CC=$CC_PATH -j$(nproc --all) ${{ inputs.codename }}_defconfig
          
          # Собираем ядро и ПРИНУДИТЕЛЬНО модули
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_PATH CC=$CC_PATH -j$(nproc --all) all modules
          
          # Устанавливаем и обрезаем модули в подготовленную папку
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_PATH CC=$CC_PATH INSTALL_MOD_PATH=../modules_tmp INSTALL_MOD_STRIP=1 modules_install || true

      - name: Pack AnyKernel3
        run: |
          # 1. Принудительно заставляем AnyKernel3 прошивать модули в телефон!
          cd AnyKernel3
          sed -i 's/do.modules=0/do.modules=1/g' anykernel.sh || true
          sed -i 's/do.vendor_dlkm=0/do.vendor_dlkm=1/g' anykernel.sh || true
          cd ..
          
          cd "$CONFIG"
          echo "Copying Image..."
          cp out/arch/arm64/boot/Image.lz4 ../AnyKernel3/Image.lz4 || true
          
          echo "Copying DTB files..."
          if [ "${{ inputs.codename }}" == "gs201" ]; then
            cat out/google-devices/gs201/dts/*.dtb > ../AnyKernel3/dtb || true
          elif [ "${{ inputs.codename }}" == "zuma" ]; then
            cat out/google-devices/zuma/dts/*.dtb > ../AnyKernel3/dtb || true
          elif [ "${{ inputs.codename }}" == "zumapro" ]; then
            cat out/google-devices/zumapro/dts/*.dtb > ../AnyKernel3/dtb || true
          fi

          echo "Copying Kernel Modules..."
          mkdir -p ../AnyKernel3/modules/vendor_dlkm/lib/modules
          
          # Ищем драйверы во временной папке и переносим их в AnyKernel3
          find ../modules_tmp -type f -name "*.ko" -exec cp {} ../AnyKernel3/modules/vendor_dlkm/lib/modules/ \;
          
          echo "=== MODULES CHECK ==="
          ls -1 ../AnyKernel3/modules/vendor_dlkm/lib/modules/ | wc -l

      - name: Create ZIP Files
        run: |
          cd ./AnyKernel3
          ZIP_NAME="${{ matrix.variant }}-${{ inputs.codename }}-A16-Sultan-${{ matrix.page_size }}.zip"
          zip -r9 "../$ZIP_NAME" * -x .git README.md *placeholder

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.codename }}-${{ matrix.variant }}-${{ matrix.page_size }}
          path: *.zip

      - name: Collect .rej files
        if: ${{ always() }}
        id: collect_rej
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          rm -rf rej
          mkdir -p rej
          found="false"
          while IFS= read -r -d '' rej_file; do
            found="true"
            original_file="${rej_file%.rej}"
            rej_rel="${rej_file#./}"
            original_rel="${original_file#./}"
            mkdir -p "rej/$(dirname "$rej_rel")"
            cp -f "$rej_file" "rej/$rej_rel"
            if [[ -f "$original_file" ]]; then
              mkdir -p "rej/$(dirname "$original_rel")"
              cp -f "$original_file" "rej/$original_rel"
            fi
          done < <(find . -type f -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Zip collected .rej bundle
        if: ${{ always() && steps.collect_rej.outputs.found == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          zip -r "rej-${{ inputs.codename }}-${{ matrix.variant }}-${{ matrix.page_size }}.zip" rej

      - name: Upload .rej bundle
        if: ${{ always() && steps.collect_rej.outputs.found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rej-${{ inputs.codename }}-${{ matrix.variant }}-${{ matrix.page_size }}
          path: rej-${{ inputs.codename }}-${{ matrix.variant }}-${{ matrix.page_size }}.zip
